name: election
description: Election AI Intelligence Platform - 10 Year Data Analysis
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  go_router: ^17.3.0

  # State Management
  provider: ^6.1.2

  # HTTP & API
  http: ^1.2.1
  dio: ^5.4.3

  # Charts & Graphs
  fl_chart: ^1.2.0
  syncfusion_flutter_charts: ^34.1.31

  # UI Components
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Icons
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^11.0.0

  # Storage
  shared_preferences: ^2.2.3

  # Firebase
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  firebase_crashlytics: 5.2.6

  # Utils
  intl: ^0.20.3
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "assets/images/logo.png"
